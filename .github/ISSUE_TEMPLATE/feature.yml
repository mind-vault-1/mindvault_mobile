name: Feature Request
description: Suggest a new feature or enhancement for MindVault
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Which platform is this feature for?
      placeholder: e.g., iOS, Android, Both
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: Which device(s) should this feature support?
      placeholder: e.g., All devices, iPhone only, etc.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: Describe the problem you're facing that this feature would solve
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see implemented?
      placeholder: Describe the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?
      placeholder: Describe any alternative solutions or workarounds you've considered
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or examples about the feature
      placeholder: Add any other context or screenshots about the feature request
    validations:
      required: false
