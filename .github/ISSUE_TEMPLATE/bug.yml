name: Bug Report
description: Report a bug to help us improve MindVault
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      placeholder: e.g., iOS, Android
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: Which device are you using?
      placeholder: e.g., iPhone 14 Pro, Samsung Galaxy S23
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Please describe the steps to reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or logs about the bug
      placeholder: Add any other context about the problem here
    validations:
      required: false
